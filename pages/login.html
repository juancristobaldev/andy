<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AndyMentor | Iniciar Sesión</title>

    <!-- Tailwind CSS (CDN para archivo único) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg: "#050505",
              surface: "#111111",
              border: "#222222",
              main: "#f8f9fa",
              muted: "#888888",
              accent: "#d90429",
              "accent-hover": "#ef233c",
              gold: "#d4af37",
            },
            fontFamily: {
              heading: ["Impact", "system-ui", "-apple-system", "sans-serif"],
              body: [
                "system-ui",
                "-apple-system",
                "BlinkMacSystemFont",
                "Segoe UI",
                "Roboto",
                "sans-serif",
              ],
            },
            scale: {
              98: "0.98",
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-bg text-main font-body antialiased flex flex-col min-h-screen selection:bg-accent selection:text-white"
  >
    <!-- Navegación sin distracciones (Ruta Cerrada) -->
    <nav
      class="w-full py-5 px-8 bg-bg border-b border-border text-center flex-shrink-0"
    >
      <a
        href="../index.html"
        class="font-heading text-[1.8rem] font-black tracking-[2px] text-main no-underline uppercase transition-opacity hover:opacity-80"
        >ANDYMENTOR.</a
      >
    </nav>

    <!-- Contenedor Principal (Centrado) -->
    <main class="flex-1 flex items-center justify-center p-5 w-full">
      <!-- Tarjeta de Login -->
      <section
        class="w-full max-w-[450px] bg-surface border border-border border-t-4 border-t-accent p-8 sm:p-10 shadow-2xl"
      >
        <div class="mb-8 text-center border-b border-border pb-6">
          <h1
            class="font-heading text-3xl sm:text-4xl text-main uppercase tracking-tight mb-2"
          >
            Acceder al Sistema
          </h1>
          <p class="text-muted text-sm uppercase tracking-widest">
            Solo ejecución. Cero excusas.
          </p>
        </div>

        <form
          id="loginForm"
          onsubmit="processLogin(event)"
          class="flex flex-col gap-6"
        >
          <div>
            <label
              for="email"
              class="block mb-2 font-bold text-xs uppercase text-gray-500 tracking-wider"
              >Correo Electrónico</label
            >
            <input
              type="email"
              id="email"
              placeholder="correo@ejemplo.com"
              required
              class="w-full bg-bg border border-border p-4 text-main font-body text-base outline-none transition-colors duration-300 focus:border-accent"
            />
          </div>

          <div>
            <div class="flex justify-between items-center mb-2">
              <label
                for="password"
                class="block font-bold text-xs uppercase text-gray-500 tracking-wider"
                >Contraseña</label
              >
              <!-- Enlace crítico de UX -->
              <a
                href="#"
                class="text-xs text-muted hover:text-accent transition-colors underline underline-offset-2"
                >¿La olvidaste?</a
              >
            </div>
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required
              class="w-full bg-bg border border-border p-4 text-main font-body text-base outline-none transition-colors duration-300 focus:border-accent"
            />
          </div>

          <button
            type="submit"
            id="loginBtn"
            class="w-full inline-flex justify-center items-center bg-accent text-white p-4 mt-2 text-lg font-extrabold uppercase tracking-widest border-none rounded-sm cursor-pointer transition-all duration-300 shadow-[0_4px_15px_rgba(217,4,41,0.2)] hover:bg-accent-hover hover:-translate-y-0.5 hover:shadow-[0_8px_25px_rgba(217,4,41,0.4)] active:translate-y-0.5 active:scale-98 disabled:bg-[#333] disabled:text-[#666] disabled:cursor-not-allowed disabled:transform-none disabled:shadow-none"
          >
            Ingresar
          </button>
        </form>

        <!-- Redirección al registro si no tiene cuenta -->
        <div class="mt-8 pt-6 border-t border-border text-center text-sm">
          <p class="text-muted mb-2">¿Aún no eres parte?</p>
          <a
            href="./register.html"
            class="text-accent hover:text-accent-hover font-bold uppercase tracking-wider underline underline-offset-4 transition-colors"
            >ÚNETE HOY</a
          >
        </div>
      </section>
    </main>

    <script>
      // Simular el proceso de inicio de sesión
      function processLogin(event) {
        event.preventDefault();

        const btn = document.getElementById("loginBtn");
        const originalText = btn.textContent;

        // Efecto visual de carga
        btn.disabled = true;
        btn.textContent = "VERIFICANDO...";

        // Simulación de llamada a API
        setTimeout(() => {
          // Cambiar estilos dinámicamente para el éxito
          btn.classList.remove("bg-accent", "hover:bg-accent-hover");
          btn.classList.add("bg-[#28a745]", "hover:bg-[#218838]");
          btn.textContent = "ACCESO CONCEDIDO";

          setTimeout(() => {
            btn.disabled = false;
            btn.classList.remove("bg-[#28a745]", "hover:bg-[#218838]");
            btn.classList.add("bg-accent", "hover:bg-accent-hover");
            btn.textContent = originalText;

            // Aquí iría la redirección real al dashboard
            // window.location.href = "/dashboard.html";
            alert("Inicio de sesión exitoso. (Simulación)");
          }, 1500);
        }, 1200);
      }
    </script>
  </body>
</html>
